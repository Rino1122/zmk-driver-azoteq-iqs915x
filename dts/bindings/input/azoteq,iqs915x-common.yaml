properties:
  rdy-gpios:
    type: phandle-array
    required: true
    description: "Data Ready (RDY) pin. IQS9150ではRDYがLOWでデータ準備完了を通知する。"

  reset-gpios:
    type: phandle-array
    description: "Reset pin (optional)"

  one-finger-tap:
    type: boolean
    description: "Enable driver-side single finger tap (left click)"

  tap-and-hold:
    type: boolean
    description: "Enable tap-and-hold drag using single tap followed by a retouch"

  tap-and-hold-reentry-timeout-ms:
    type: int
    description: "Delay in ms after a single tap during which a retouch starts drag"
    default: 300

  tap-and-hold-release-timeout-ms:
    type: int
    description: "Delay in ms before releasing drag after finger count becomes zero"
    default: 500

  two-finger-tap:
    type: boolean
    description: "Enable driver-side two finger tap (right click)"

  scroll:
    type: boolean
    description: "Enable driver-side two-finger scroll from absolute coordinates"

  switch-xy:
    type: boolean
    description: "Swap x and y axes"

  flip-x:
    type: boolean
    description: "Invert x axis direction"

  flip-y:
    type: boolean
    description: "Invert y axis direction"

  scroll-divisor:
    type: int
    default: 2
    description: |
      Scroll sensitivity divisor. Smaller values = more sensitive scrolling.
      Default: 2. Increase for slower scrolling, decrease for faster.

  tap-move-threshold:
    type: int
    default: 0
    description: |
      Maximum movement in raw coordinate units for a touch sequence to remain
      eligible as a one- or two-finger tap. Set 0 to derive the threshold from
      the configured X/Y resolution.

  scroll-inertia:
    type: boolean
    description: |
      Enable scroll inertia. When enabled, scrolling continues with momentum
      after releasing fingers and decays according to the inertia profile.

  trigger-ms:
    type: int
    default: 35
    description: |
      Delay in ms between the last manual scroll input and inertia start.
      Recommended: at least 2x your sensor polling interval.

  scroll-decay-factor-int:
    type: int
    default: 85
    description: |
      Scroll inertia retention percentage (0-100) applied at each inertia tick.
      Higher values produce longer inertia.

  scroll-report-interval-ms:
    type: int
    default: 65
    description: |
      Interval in ms between inertia decay ticks.

  scroll-threshold-start:
    type: int
    default: 2
    description: |
      Minimum manual scroll velocity required to arm inertia start.

  scroll-threshold-stop:
    type: int
    default: 0
    description: |
      Minimum decayed scroll velocity required to continue inertia.
      Inertia stops when both axes are below or equal to this value.

  scroll-inertia-decay:
    type: int
    default: 850
    deprecated: true
    description: |
      Deprecated fallback for scroll-decay-factor-int.
      x/1000 retention units (850 -> 85%).

  scroll-inertia-interval-ms:
    type: int
    default: 65
    deprecated: true
    description: |
      Deprecated fallback for scroll-report-interval-ms.

  scroll-inertia-recent-window-ms:
    type: int
    default: 60
    deprecated: true
    description: |
      Deprecated legacy property. Not used by the current scroll inertia model.

  scroll-inertia-stale-gap-ms:
    type: int
    default: 35
    deprecated: true
    description: |
      Deprecated fallback for trigger-ms.

  scroll-inertia-min-samples:
    type: int
    default: 1
    deprecated: true
    description: |
      Deprecated legacy property. Not used by the current scroll inertia model.

  scroll-inertia-min-avg-speed:
    type: int
    default: 4
    deprecated: true
    description: |
      Deprecated fallback for scroll-threshold-start/stop.

  pinch-inertia:
    type: boolean
    description: |
      Enable pinch wheel inertia. This remains disabled by default until
      coordinate-based pinch output is fully wired.

  pinch-inertia-decay:
    type: int
    default: 980
    description: |
      Pinch inertia decay in x/1000 units. Larger values decay more slowly.

  pinch-inertia-interval-ms:
    type: int
    default: 10
    description: |
      Interval in ms between pinch inertia ticks. Default: 10.

  pinch-inertia-recent-window-ms:
    type: int
    default: 60
    description: |
      Recent motion window in ms used to seed pinch inertia.

  pinch-inertia-stale-gap-ms:
    type: int
    default: 35
    description: |
      Maximum allowed time in ms between the last pinch sample and
      release when seeding pinch inertia.

  pinch-inertia-min-samples:
    type: int
    default: 1
    description: |
      Minimum number of recent pinch samples required to seed
      pinch inertia.

  pinch-inertia-min-avg-speed:
    type: int
    default: 4
    description: |
      Minimum average recent pinch speed required to seed pinch inertia.

  finger-debounce-frames:
    type: int
    default: 2
    description: |
      Number of consecutive frames required before a new finger count is
      treated as stable by the software finger-count state machine.

  three-finger-swipe:
    type: boolean
    description: |
      Enable three-finger swipe as one-shot gesture input event generated from
      multi-finger centroid motion.

  four-finger-swipe:
    type: boolean
    description: |
      Enable four-finger swipe as one-shot gesture input event generated from
      multi-finger centroid motion.

  swipe-step:
    type: int
    default: 0
    description: |
      Absolute swipe threshold in raw coordinate units. Set >0 to force a
      fixed threshold for both axes. If set to 0 (default), the driver reads
      X/Y resolutions from init-data registers 0x11E6/0x11E8 and computes one
      shared threshold from the smaller resolution by ratio
      (numerator/denominator).

  swipe-threshold-numerator:
    type: int
    default: 1
    description: |
      Numerator of the auto threshold ratio applied to the smaller X/Y
      resolution when swipe-step is 0.

  swipe-threshold-denominator:
    type: int
    default: 5
    description: |
      Denominator of the auto threshold ratio applied to the smaller X/Y
      resolution when swipe-step is 0. Default 1/5 means trigger after about
      20% movement of the smaller axis.

  swipe-direction-settle-frames:
    type: int
    default: 2
    description: |
      Number of post-baseline stable 3/4-finger frames to observe before the
      driver may lock and emit a swipe direction. This filters touch-down
      centroid noise before direction recognition.

  swipe-direction-lock-numerator:
    type: int
    default: 3
    description: |
      Numerator of the dominant-axis lock ratio for 3/4-finger swipes. A swipe
      emits only when the dominant axis is at least numerator/denominator times
      the other axis.

  swipe-direction-lock-denominator:
    type: int
    default: 2
    description: |
      Denominator of the dominant-axis lock ratio for 3/4-finger swipes.
      Default 3/2 means the dominant axis must be about 1.5x the other axis.

  three-finger-swipe-up-key:
    type: int
    description: |
      Deprecated. Older builds emitted this key code for 3-finger swipe up.
      Current builds emit IQS915X_GESTURE_3F_UP on IQS915X_INPUT_EV_GESTURE.

  three-finger-swipe-down-key:
    type: int
    description: |
      Deprecated. Older builds emitted this key code for 3-finger swipe down.
      Current builds emit IQS915X_GESTURE_3F_DOWN on IQS915X_INPUT_EV_GESTURE.

  three-finger-swipe-left-key:
    type: int
    description: |
      Deprecated. Older builds emitted this key code for 3-finger swipe left.
      Current builds emit IQS915X_GESTURE_3F_LEFT on IQS915X_INPUT_EV_GESTURE.

  three-finger-swipe-right-key:
    type: int
    description: |
      Deprecated. Older builds emitted this key code for 3-finger swipe right.
      Current builds emit IQS915X_GESTURE_3F_RIGHT on IQS915X_INPUT_EV_GESTURE.

  four-finger-swipe-up-key:
    type: int
    description: |
      Deprecated. Older builds emitted this key code for 4-finger swipe up.
      Current builds emit IQS915X_GESTURE_4F_UP on IQS915X_INPUT_EV_GESTURE.

  four-finger-swipe-down-key:
    type: int
    description: |
      Deprecated. Older builds emitted this key code for 4-finger swipe down.
      Current builds emit IQS915X_GESTURE_4F_DOWN on IQS915X_INPUT_EV_GESTURE.

  four-finger-swipe-left-key:
    type: int
    description: |
      Deprecated. Older builds emitted this key code for 4-finger swipe left.
      Current builds emit IQS915X_GESTURE_4F_LEFT on IQS915X_INPUT_EV_GESTURE.

  four-finger-swipe-right-key:
    type: int
    description: |
      Deprecated. Older builds emitted this key code for 4-finger swipe right.
      Current builds emit IQS915X_GESTURE_4F_RIGHT on IQS915X_INPUT_EV_GESTURE.

  tap-time:
    type: int
    description: |
      Driver-side tap detection time in ms. If not set, the driver uses its
      built-in tap duration fallback.
      Shorter values make taps more responsive but may cause false positives.

  report-rate-ms:
    type: int
    description: |
      Active mode sampling period in ms. Lower values = smoother cursor but
      higher power consumption. If not set, IQS9150 NVM default is used.
      Typical: 10 (100Hz default), 5 (200Hz), 2 (500Hz).

  report-absolute:
    type: boolean
    description: |
      Use finger 1 absolute coordinates from registers 0x1024/0x1026 as the
      internal pointer source and convert them to relative deltas in the driver.
      Host-facing output remains INPUT_REL_X and INPUT_REL_Y.
      If unset, the driver uses REL_X/REL_Y registers directly.

  disabled-by-default:
    type: boolean
    description: |
      Start with trackpad disabled (enter LP2 after initialization) at boot.
      Use iqs915x_set_enabled() API to enable/disable the trackpad
      at runtime, e.g. from a ZMK behavior or key binding.
