properties:
  rdy-gpios:
    type: phandle-array
    required: true
    description: "Data Ready (RDY) pin. IQS9150ではRDYがLOWでデータ準備完了を通知する。"

  reset-gpios:
    type: phandle-array
    description: "Reset pin (optional)"

  one-finger-tap:
    type: boolean
    description: "Enable single finger tap (left click)"

  press-and-hold:
    type: boolean
    description: "Enable press and hold (left click until released)"

  press-and-hold-time:
    type: int
    description: "Press and hold detection time in ms (added to tap time)"
    default: 250

  two-finger-tap:
    type: boolean
    description: "Enable two finger tap (right click)"

  scroll:
    type: boolean
    description: "Enable two-finger scroll (vertical and horizontal)"

  switch-xy:
    type: boolean
    description: "Swap x and y axes"

  flip-x:
    type: boolean
    description: "Invert x axis direction"

  flip-y:
    type: boolean
    description: "Invert y axis direction"

  scroll-divisor:
    type: int
    default: 2
    description: |
      Scroll sensitivity divisor. Smaller values = more sensitive scrolling.
      Default: 2. Increase for slower scrolling, decrease for faster.

  scroll-inertia:
    type: boolean
    description: |
      Enable scroll inertia. When enabled, scrolling continues with momentum
      after releasing fingers and decays according to the inertia profile.

  trigger-ms:
    type: int
    default: 35
    description: |
      Delay in ms between the last manual scroll input and inertia start.
      Recommended: at least 2x your sensor polling interval.

  scroll-decay-factor-int:
    type: int
    default: 85
    description: |
      Scroll inertia retention percentage (0-100) applied at each inertia tick.
      Higher values produce longer inertia.

  scroll-report-interval-ms:
    type: int
    default: 65
    description: |
      Interval in ms between inertia decay ticks.

  scroll-threshold-start:
    type: int
    default: 2
    description: |
      Minimum manual scroll velocity required to arm inertia start.

  scroll-threshold-stop:
    type: int
    default: 0
    description: |
      Minimum decayed scroll velocity required to continue inertia.
      Inertia stops when both axes are below or equal to this value.

  scroll-inertia-decay:
    type: int
    default: 850
    deprecated: true
    description: |
      Deprecated fallback for scroll-decay-factor-int.
      x/1000 retention units (850 -> 85%).

  scroll-inertia-interval-ms:
    type: int
    default: 65
    deprecated: true
    description: |
      Deprecated fallback for scroll-report-interval-ms.

  scroll-inertia-recent-window-ms:
    type: int
    default: 60
    deprecated: true
    description: |
      Deprecated legacy property. Not used by the current scroll inertia model.

  scroll-inertia-stale-gap-ms:
    type: int
    default: 35
    deprecated: true
    description: |
      Deprecated fallback for trigger-ms.

  scroll-inertia-min-samples:
    type: int
    default: 1
    deprecated: true
    description: |
      Deprecated legacy property. Not used by the current scroll inertia model.

  scroll-inertia-min-avg-speed:
    type: int
    default: 4
    deprecated: true
    description: |
      Deprecated fallback for scroll-threshold-start/stop.

  pinch-inertia:
    type: boolean
    description: |
      Enable pinch wheel inertia. This remains disabled by default until
      coordinate-based pinch output is fully wired.

  pinch-inertia-decay:
    type: int
    default: 980
    description: |
      Pinch inertia decay in x/1000 units. Larger values decay more slowly.

  pinch-inertia-interval-ms:
    type: int
    default: 10
    description: |
      Interval in ms between pinch inertia ticks. Default: 10.

  pinch-inertia-recent-window-ms:
    type: int
    default: 60
    description: |
      Recent motion window in ms used to seed pinch inertia.

  pinch-inertia-stale-gap-ms:
    type: int
    default: 35
    description: |
      Maximum allowed time in ms between the last pinch sample and
      release when seeding pinch inertia.

  pinch-inertia-min-samples:
    type: int
    default: 1
    description: |
      Minimum number of recent pinch samples required to seed
      pinch inertia.

  pinch-inertia-min-avg-speed:
    type: int
    default: 4
    description: |
      Minimum average recent pinch speed required to seed pinch inertia.

  finger-debounce-frames:
    type: int
    default: 2
    description: |
      Number of consecutive frames required before a new finger count is
      treated as stable by the software finger-count state machine.

  three-finger-swipe:
    type: boolean
    description: |
      Enable three-finger swipe as one-shot virtual key event generated from
      multi-finger centroid motion.

  four-finger-swipe:
    type: boolean
    description: |
      Enable four-finger swipe as one-shot virtual key event generated from
      multi-finger centroid motion.

  swipe-step:
    type: int
    default: 0
    description: |
      Absolute swipe threshold in raw coordinate units. Set >0 to force a
      fixed threshold for both axes. If set to 0 (default), the driver reads
      X/Y resolutions from init-data registers 0x11E6/0x11E8 and computes
      thresholds by ratio (numerator/denominator).

  swipe-threshold-numerator:
    type: int
    default: 1
    description: |
      Numerator of the auto threshold ratio applied to X/Y resolution when
      swipe-step is 0.

  swipe-threshold-denominator:
    type: int
    default: 5
    description: |
      Denominator of the auto threshold ratio applied to X/Y resolution when
      swipe-step is 0. Default 1/5 means trigger after about 20% movement.

  three-finger-swipe-up-key:
    type: int
    description: |
      Key code emitted for 3-finger swipe up. If unset, defaults to F13.

  three-finger-swipe-down-key:
    type: int
    description: |
      Key code emitted for 3-finger swipe down. If unset, defaults to F14.

  three-finger-swipe-left-key:
    type: int
    description: |
      Key code emitted for 3-finger swipe left. If unset, defaults to F15.

  three-finger-swipe-right-key:
    type: int
    description: |
      Key code emitted for 3-finger swipe right. If unset, defaults to F16.

  four-finger-swipe-up-key:
    type: int
    description: |
      Key code emitted for 4-finger swipe up. If unset, defaults to F17.

  four-finger-swipe-down-key:
    type: int
    description: |
      Key code emitted for 4-finger swipe down. If unset, defaults to F18.

  four-finger-swipe-left-key:
    type: int
    description: |
      Key code emitted for 4-finger swipe left. If unset, defaults to F19.

  four-finger-swipe-right-key:
    type: int
    description: |
      Key code emitted for 4-finger swipe right. If unset, defaults to F20.

  tap-time:
    type: int
    description: |
      Tap detection time in ms. If not set, IQS9150 NVM default is used.
      Shorter values make taps more responsive but may cause false positives.

  report-rate-ms:
    type: int
    description: |
      Active mode sampling period in ms. Lower values = smoother cursor but
      higher power consumption. If not set, IQS9150 NVM default is used.
      Typical: 10 (100Hz default), 5 (200Hz), 2 (500Hz).

  report-absolute:
    type: boolean
    description: |
      Use finger 1 absolute coordinates from registers 0x1024/0x1026 as the
      internal pointer source and convert them to relative deltas in the driver.
      Host-facing output remains INPUT_REL_X and INPUT_REL_Y.
      If unset, the driver uses REL_X/REL_Y registers directly.

  disabled-by-default:
    type: boolean
    description: |
      Start with trackpad disabled (enter LP2 after initialization) at boot.
      Use iqs915x_set_enabled() API to enable/disable the trackpad
      at runtime, e.g. from a ZMK behavior or key binding.
